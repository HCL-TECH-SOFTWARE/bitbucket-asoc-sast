name: Mend Security Scan

on:
  pull_request:
    branches: [ASPL-1464]
    types: [opened, synchronize]

env:
  MEND_AGENT_VERSION: "20.10.2"
  JAVA_VERSION: "11"
  JAVA_DISTRIBUTION: "temurin"

jobs:
  scan-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # - name: Check for dependency file changes
      #   uses: dorny/paths-filter@v3
      #   id: filter
      #   with:
      #     filters: |
      #       dependencies:
      #         - 'linux/requirements.txt'
      #         - 'linux/Dockerfile'
      #         - 'common/**'

      # - name: Skip if no dependency changes
      #   if: github.event.action != 'opened' && steps.filter.outputs.dependencies != 'true'
      #   run: echo "No relevant changes for Linux image, skipping scan."

      - name: Build Linux Docker image
        # if: github.event.action == 'opened' || steps.filter.outputs.dependencies == 'true'
        run: docker build -f linux/Dockerfile -t bitbucket_asoc_sast_linux:${{ github.run_id }} .

      - uses: actions/setup-java@v3
        # if: github.event.action == 'opened' || steps.filter.outputs.dependencies == 'true'
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Download Mend Agent
        # if: github.event.action == 'opened' || steps.filter.outputs.dependencies == 'true'
        run: |
          curl -fsSL https://unified-agent.s3.amazonaws.com/wss-unified-agent-${{ env.MEND_AGENT_VERSION }}.jar -o wss-unified-agent-${{ env.MEND_AGENT_VERSION }}.jar

      - name: Run Mend Scan (Linux)
        # if: github.event.action == 'opened' || steps.filter.outputs.dependencies == 'true'
        env:
          MEND_API_KEY: ${{ secrets.MEND_KEY }}
        run: |
          echo "docker.includes=bitbucket_asoc_sast_linux:${{ github.run_id }}" >> linux/wss-unified-agent.config
          java -jar wss-unified-agent-${{ env.MEND_AGENT_VERSION }}.jar -apiKey "${MEND_API_KEY}" -c linux/wss-unified-agent.config

  scan-windows:
    runs-on: windows-2022
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # - name: Check for dependency file changes
      #   uses: dorny/paths-filter@v3
      #   id: filter
      #   with:
      #     filters: |
      #       dependencies:
      #         - 'windows/requirements.txt'
      #         - 'windows/Dockerfile'
      #         - 'common/**'

      # - name: Skip if no dependency changes
      #   if: github.event.action != 'opened' && steps.filter.outputs.dependencies != 'true'
      #   run: echo "No relevant changes for Windows image, skipping scan."

      - name: Verify Docker is in Windows containers mode
        # if: github.event.action == 'opened' || steps.filter.outputs.dependencies == 'true'
        run: |
          $osType = docker info --format "{{.OSType}}"
          Write-Host "Docker OS type: $osType"
          if ($osType -ne "windows") {
            Write-Error "Docker is not in Windows containers mode (OSType: $osType). windows-2022 runners should default to Windows containers."
            exit 1
          }
          Write-Host "Docker is already configured for Windows containers."

      - name: Build Windows Docker image
        # if: github.event.action == 'opened' || steps.filter.outputs.dependencies == 'true'
        run: docker build -f windows/Dockerfile -t bitbucket_asoc_sast_windows:${{ github.run_id }} .

      - uses: actions/setup-java@v3
        # if: github.event.action == 'opened' || steps.filter.outputs.dependencies == 'true'
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Download Mend Agent
        # if: github.event.action == 'opened' || steps.filter.outputs.dependencies == 'true'
        run: |
          Invoke-WebRequest -Uri "https://unified-agent.s3.amazonaws.com/wss-unified-agent-${{ env.MEND_AGENT_VERSION }}.jar" -OutFile "wss-unified-agent-${{ env.MEND_AGENT_VERSION }}.jar"

      - name: Run Mend Scan (Windows)
        # if: github.event.action == 'opened' || steps.filter.outputs.dependencies == 'true'
        env:
          MEND_API_KEY: ${{ secrets.MEND_KEY }}
        run: |
          Add-Content -Path windows/wss-unified-agent.config -Value "docker.includes=bitbucket_asoc_sast_windows:${{ github.run_id }}"
          java -jar "wss-unified-agent-${{ env.MEND_AGENT_VERSION }}.jar" -apiKey "$env:MEND_API_KEY" -c windows/wss-unified-agent.config
